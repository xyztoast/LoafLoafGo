# Smart New Tab Interface

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #4285f4;
            --blur: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Background Landscape */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5)),
                        url('https://images.unsplash.com/photo-1723974204878-16e9c33f02c1?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;

            background-position: center;
            z-index: -1;
            transition: transform 0.5s ease;
        }

        /* Main Container */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }

        /* Time and Date Display */
        .time-section {
            text-align: center;

            margin-bottom: auto;
            margin-top: 10vh;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-out;
        }

        #clock {
            font-size: 6rem;
            font-weight: 600;
            letter-spacing: -2px;
        }

        #date {
            font-size: 1.5rem;
            font-weight: 300;
            opacity: 0.9;
            margin-top: -10px;
        }


        /* Search Bar Section (Gemini Style) */
        .search-section {
            width: 100%;
            max-width: 800px;
            margin-bottom: 15vh;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .search-bar-container {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;

            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .search-bar-container:focus-within {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }

        .search-icon {
            margin-right: 15px;
            opacity: 0.7;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;

            outline: none;
            color: white;
            font-size: 1.1rem;
            padding: 12px 0;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .submit-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;
            transition: background 0.2s;
            margin-left: 10px;
        }

        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .submit-btn svg {
            fill: white;
            width: 20px;
            height: 20px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }

        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Adjustments */
        @media (max-width: 600px) {
            #clock { font-size: 4rem; }
            #date { font-size: 1.2rem; }
            .search-section { padding: 0 10px; }
        }

    </style>
</head>
<body>

    <div class="background" id="bg"></div>

    <div class="container">
        <!-- Time and Date -->
        <div class="time-section">
            <div id="clock">00:00</div>
            <div id="date">Saturday, April 18</div>
        </div>

        <!-- Gemini-style Search Bar -->
        <div class="search-section">
            <form id="search-form">
                <div class="search-bar-container">
                    <div class="search-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)">

                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </div>
                    <input type="text" placeholder="Ask anything or enter a URL..." autocomplete="off" id="search-input">
                    <button type="submit" class="submit-btn">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Update Clock and Date
        function updateTime() {
            const now = new Date();
            

            // Format time
            let hours = now.getHours();
            let minutes = now.getMinutes();
            minutes = minutes < 10 ? '0' + minutes : minutes;
            const timeString = hours + ':' + minutes;
            document.getElementById('clock').textContent = timeString;

            // Format date
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }

        // Run clock every second
        setInterval(updateTime, 1000);
        updateTime();

        // Subtle background parallax effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;

            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.getElementById('bg').style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
        });

        // Smart Navigation Logic (URL vs Search)
        const form = document.getElementById('search-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('search-input').value.trim();
            
            if (!query) return;

            // URL Detection Logic
            // Checks for protocol (http/https) OR a typical domain structure (word.tld) without spaces
            const urlPattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/i;
            const isUrl = urlPattern.test(query) && !query.includes(' ');

            if (isUrl) {
                // If it's a URL but missing protocol, add https://

                let targetUrl = query;
                if (!/^https?:\/\//i.test(query)) {
                    targetUrl = 'https://' + query;
                }
                window.location.href = targetUrl;
            } else {
                // Otherwise, perform a Google Search
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        });

        // Focus input on any keypress
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName !== 'INPUT' && e.key.length === 1) {
                document.getElementById('search-input').focus();
            }
        });
    </script>
</body>
</html>
