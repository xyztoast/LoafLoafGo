<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoafLoafGo</title>
    <!-- Importing Fira Code -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', monospace;
        }

        :root {
            --accent-color: #698f50; 

            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0a0a0a;
        }

        /* High-Reliability Background */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;

            z-index: -1;
            background-image: url('https://images.unsplash.com/photo-1723974204878-16e9c33f02c1?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.4s ease-out;
        }

        #bg-layer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
        }

        /* Container */

        .container {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Brand Title */
        .brand-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1.2s ease-out;
            cursor: default;

        }

        .brand-title {
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transition-smooth);
        }

        .brand-title:hover {
            transform: translateY(-5px);
            text-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        /* Interaction Area */
        .interaction-area {
            width: 100%;
            max-width: 800px;

            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Search Bar */
        .search-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: var(--transition-smooth);
        }


        .search-bar:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .search-bar:focus-within {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent-color);
            box-shadow: 0 8px 32px rgba(105, 143, 80, 0.2);
            transform: translateY(-2px);
        }

        .search-icon {
            margin-right: 15px;
            opacity: 0.8;
            display: flex;
            transition: var(--transition-smooth);
        }


        .search-bar:focus-within .search-icon {
            color: var(--accent-color);
            opacity: 1;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1rem;
            padding: 12px 0;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }


        /* Bookmarks Row */
        .bookmarks-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 12px;
            align-items: center;
        }

        .bookmark-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 18px;
            text-decoration: none;

            color: white;
            font-size: 0.8rem;
            font-weight: 300;
            transition: var(--transition-smooth);
            user-select: none;
        }

        .bookmark-link:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(105, 143, 80, 0.3);
        }

        .fav-icon {
            width: 14px;
            height: 14px;
            object-fit: contain;
            display: block;

        }

        .add-bookmark-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition-smooth);
        }

        .add-bookmark-btn:hover {
            background: var(--accent-color);

            border-color: var(--accent-color);
            transform: scale(1.2) rotate(90deg);
        }

        /* Modal Overlay */
        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-box {
            background: rgba(30, 30, 30, 0.95);

            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            border-radius: 20px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-box h3 {
            color: #ffffff;
            font-weight: 400;
            margin-bottom: 5px;
        }

        .modal-box input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);

            padding: 10px;
            border-radius: 8px;
            color: white;
            transition: border-color 0.2s;
        }

        .modal-box input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;

            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            border: none;
            transition: var(--transition-smooth);
        }

        .btn-save { background: var(--accent-color); color: white; }
        .btn-save:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-cancel { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }

        /* Custom Context Menu */
        #custom-menu {
            position: fixed;
            z-index: 2000;
            width: 150px;
            background: rgba(35, 35, 35, 0.95);

            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            padding: 5px;
        }

        .menu-item {
            padding: 10px 15px;
            color: #eee;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;

        }

        .menu-item:hover {
            background: var(--accent-color);
            color: white;
        }

        .menu-item.delete:hover {
            background: #b54d4d;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .brand-title { font-size: 3rem; }
        }
    </style>
</head>
<body>


    <div id="bg-layer"></div>

    <div class="container">
        <div class="brand-section">
            <h1 class="brand-title">LoafLoafGo</h1>
        </div>

        <div class="interaction-area">
            <div class="search-bar">
                <span class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </span>
                <input type="text" placeholder="Search or type URL..." id="search-input" autocomplete="off">
            </div>

            <div class="bookmarks-row" id="bookmarks-row">
                <button class="add-bookmark-btn" id="add-btn">+</button>

            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal">
        <div class="modal-box">
            <h3 id="modal-title">New Bookmark</h3>
            <input type="text" id="name-input" placeholder="Title">
            <input type="text" id="url-input" placeholder="URL (e.g. google.com)">
            <div class="modal-actions">
                <button class="btn btn-cancel" id="cancel-btn">Cancel</button>
                <button class="btn btn-save" id="save-btn">Save</button>
            </div>
        </div>
    </div>

    <!-- Custom Context Menu -->
    <div id="custom-menu">

        <div class="menu-item" id="menu-edit">Edit</div>
        <div class="menu-item delete" id="menu-delete">Delete</div>
    </div>

    <script>
        // Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            const bg = document.getElementById('bg-layer');
            if (bg) bg.style.transform = `scale(1.05) translate(${moveX}px, ${moveY}px)`;
        });

        // Search Logic
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (!query) return;

                const isUrl = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/i.test(query) && !query.includes(' ');
                if (isUrl) {
                    window.location.href = query.startsWith('http') ? query : 'https://' + query;
                } else {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                }
            }
        });

        // Bookmark Logic
        const bookmarksRow = document.getElementById('bookmarks-row');
        const modal = document.getElementById('modal');
        const addBtn = document.getElementById('add-btn');
        const customMenu = document.getElementById('custom-menu');
        
        let editingIndex = -1;
        let activeBookmarkIndex = -1;

        function renderBookmarks() {

            document.querySelectorAll('.bookmark-link').forEach(el => el.remove());
            const stored = JSON.parse(localStorage.getItem('loaf_bookmarks') || '[]');
            
            stored.forEach((bm, i) => {
                const domain = bm.url.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0];
                const link = document.createElement('a');
                link.className = 'bookmark-link';
                link.href = bm.url.startsWith('http') ? bm.url : 'https://' + bm.url;
                
                const icon = document.createElement('img');
                icon.className = 'fav-icon';
                icon.src = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
                icon.onerror = () => {
                    icon.style.display = 'none';
                    const fallback = document.createElement('span');
                    fallback.innerHTML = '🌐';
                    fallback.style.fontSize = '12px';
                    link.prepend(fallback);
                };


                link.appendChild(icon);
                link.appendChild(document.createTextNode(bm.name));
                
                link.oncontextmenu = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    activeBookmarkIndex = i;
                    showContextMenu(e.clientX, e.clientY);
                };

                bookmarksRow.insertBefore(link, addBtn);
            });
        }

        // Context Menu Logic
        function showContextMenu(x, y) {
            customMenu.style.display = 'flex';
            customMenu.style.left = `${x}px`;
            customMenu.style.top = `${y}px`;

        }

        function hideContextMenu() {
            customMenu.style.display = 'none';
            // Index cleared later to avoid race conditions
        }

        document.addEventListener('click', () => {
            hideContextMenu();
            activeBookmarkIndex = -1; 
        });

        // FIXED Deletion Logic
        document.getElementById('menu-delete').onclick = (e) => {
            e.stopPropagation();
            const indexToRemove = activeBookmarkIndex; // Capture current index locally
            
            if (indexToRemove !== -1) {
                const stored = JSON.parse(localStorage.getItem('loaf_bookmarks') || '[]');

                const target = stored[indexToRemove];
                
                if (target && confirm(`Delete "${target.name}"?`)) {
                    stored.splice(indexToRemove, 1);
                    localStorage.setItem('loaf_bookmarks', JSON.stringify(stored));
                    renderBookmarks();
                }
            }
            hideContextMenu();
            activeBookmarkIndex = -1; // Clear index after action
        };

        // Editing Logic
        document.getElementById('menu-edit').onclick = (e) => {
            e.stopPropagation();
            if (activeBookmarkIndex !== -1) {
                const stored = JSON.parse(localStorage.getItem('loaf_bookmarks') || '[]');
                const bm = stored[activeBookmarkIndex];
                

                document.getElementById('modal-title').innerText = "Edit Bookmark";
                document.getElementById('name-input').value = bm.name;
                document.getElementById('url-input').value = bm.url;
                editingIndex = activeBookmarkIndex;
                modal.style.display = 'flex';
            }
            hideContextMenu();
            activeBookmarkIndex = -1;
        };

        addBtn.onclick = () => {
            document.getElementById('modal-title').innerText = "New Bookmark";
            document.getElementById('name-input').value = '';
            document.getElementById('url-input').value = '';
            editingIndex = -1;
            modal.style.display = 'flex';
        };

        document.getElementById('cancel-btn').onclick = () => modal.style.display = 'none';

        
        document.getElementById('save-btn').onclick = () => {
            const name = document.getElementById('name-input').value.trim();
            const url = document.getElementById('url-input').value.trim();
            if (name && url) {
                const stored = JSON.parse(localStorage.getItem('loaf_bookmarks') || '[]');
                if (editingIndex === -1) {
                    stored.push({ name, url });
                } else {
                    stored[editingIndex] = { name, url };
                }
                localStorage.setItem('loaf_bookmarks', JSON.stringify(stored));
                modal.style.display = 'none';
                renderBookmarks();
            }
        };

        renderBookmarks();


        // Focus search on keypress
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName !== 'INPUT' && 
                e.key.length === 1 && 
                modal.style.display !== 'flex' &&
                !e.ctrlKey && !e.metaKey) {
                searchInput.focus();
            }
        });
    </script>
</body>
</html>
