<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Component</title>
  <style>
    /* --- Theme Variables (Adjust these to match your existing page) --- */
    :root {
      --bg-color: #1e1e2e;
      --search-bg: #252538;
      --text-color: #cdd6f4;
      --border-color: #45475a;
      --accent-color: #89b4fa; /* Google blue / Accent */
      --ddg-color: #de5833;    /* DuckDuckGo Orange */
      --radius: 24px;
    }

    body {
      background-color: var(--bg-color);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      padding-top: 100px;
      color: var(--text-color);
    }

    /* --- Search Container --- */
    .search-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 0 20px;
    }

    /* Search Input Wrapper */
    .search-wrapper {
      display: flex;
      align-items: center;
      background-color: var(--search-bg);
      border: 2px solid var(--border-color);
      border-radius: var(--radius);
      padding: 6px 16px;
      transition: border-color 0.2s, border-radius 0.2s;
    }

    /* Flatten bottom corners when suggestions are active to look connected */
    .search-container.has-suggestions .search-wrapper {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom-color: transparent;
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-color);
      font-size: 16px;
      padding: 8px 0;
      padding-right: 12px;
    }

    /* --- Custom Engine Toggle Switch --- */
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .engine-label {
      font-size: 12px;
      font-weight: 600;
      min-width: 24px;
      text-align: center;
      transition: color 0.2s;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--accent-color);
      transition: 0.3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    /* DuckDuckGo Checked State */
    input:checked + .slider {
      background-color: var(--ddg-color);
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    /* --- Floating Suggestions Box --- */
    .suggestions-box {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: var(--search-bg);
      border: 2px solid var(--border-color);
      border-top: none;
      border-bottom-left-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      z-index: 999;
      display: none; /* Hidden by default */
      overflow: hidden;
    }

    /* Display suggestions when parent container has class */
    .search-container.has-suggestions .suggestions-box {
      display: block;
    }

    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .suggestion-item:hover {
      background-color: var(--border-color);
    }
  </style>
</head>
<body>

  <div class="search-container" id="searchContainer">
    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="Search or type a URL..." autocomplete="off">
      
      <div class="toggle-container">
        <span class="engine-label" id="engineLabel" style="color: var(--accent-color);">G</span>
        <label class="switch">
          <input type="checkbox" id="engineToggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="suggestions-box" id="suggestionsBox">
      <div class="suggestion-item">Example Search Suggestion 1</div>
      <div class="suggestion-item">Example Search Suggestion 2</div>
      <div class="suggestion-item">Example Search Suggestion 3</div>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const searchContainer = document.getElementById('searchContainer');
    const engineToggle = document.getElementById('engineToggle');
    const engineLabel = document.getElementById('engineLabel');
    const suggestionsBox = document.getElementById('suggestionsBox');

    // Update label text/color on toggle change
    engineToggle.addEventListener('change', () => {
      if (engineToggle.checked) {
        engineLabel.textContent = 'DDG';
        engineLabel.style.color = 'var(--ddg-color)';
      } else {
        engineLabel.textContent = 'G';
        engineLabel.style.color = 'var(--accent-color)';
      }
    });

    // Dummy helper to show/hide suggestions box and trigger connected layout
    searchInput.addEventListener('input', () => {
      if (searchInput.value.trim().length > 0) {
        searchContainer.classList.add('has-suggestions');
      } else {
        searchContainer.classList.remove('has-suggestions');
      }
    });

    // Close suggestions if clicking outside
    document.addEventListener('click', (e) => {
      if (!searchContainer.contains(e.target)) {
        searchContainer.classList.remove('has-suggestions');
      }
    });

    // Helper function to check if input is a valid URL
    function isURL(str) {
      // Basic check for protocol or popular domain endings without spaces
      const urlPattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/i;
      return urlPattern.test(str.trim()) && !str.includes(' ');
    }

    // Handle Submission
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = searchInput.value.trim();
        if (!query) return;

        if (isURL(query)) {
          // It's a direct URL address, point straight to it
          let url = query;
          if (!/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
          }
          window.location.href = url;
        } else {
          // It's a text query, use the selected search engine
          let searchUrl = '';
          if (engineToggle.checked) {
            // DuckDuckGo
            searchUrl = `https://duckduckgo.com/?q=${encodeURIComponent(query)}`;
          } else {
            // Google
            searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
          }
          window.location.href = searchUrl;
        }
      }
    });

    // Make suggestion items clickable
    document.querySelectorAll('.suggestion-item').forEach(item => {
      item.addEventListener('click', () => {
        searchInput.value = item.textContent;
        // Trigger enter key behavior
        searchInput.dispatchEvent(new KeyboardEvent('keydown', {'key': 'Enter'}));
      });
    });
  </script>

</body>
</html>
