<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoafLoafGo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --blur: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', monospace;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #111; /* Dark fallback */
        }

        /* Fixed Background Container */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('https://images.unsplash.com/photo-1723974204878-16e9c33f02c1?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.5s ease;
        }

        /* Overlay to ensure text readability */
        .background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
        }

        /* Main Container */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Brand Title */
        .brand-section {
            text-align: center;
            margin-bottom: auto;
            margin-top: 15vh;
            animation: fadeIn 1.2s ease-out;
        }

        .brand-title {
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: -2px;
            color: #ffffff;
            text-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Search Bar Section (Gemini Style) */
        .search-section {
            width: 100%;
            max-width: 800px;
            margin-bottom: 15vh;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .search-bar-container {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .search-bar-container:focus-within {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            transform: translateY(-2px);
        }

        .search-icon {
            margin-right: 15px;
            opacity: 0.8;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1rem;
            padding: 12px 0;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .submit-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            margin-left: 10px;
        }

        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .submit-btn svg {
            fill: white;
            width: 20px;
            height: 20px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Adjustments */
        @media (max-width: 600px) {
            .brand-title { font-size: 3rem; }
            .search-section { padding: 0 10px; }
        }
    </style>
</head>
<body>

    <div class="background" id="bg"></div>

    <div class="container">
        <!-- Branding Section -->
        <div class="brand-section">
            <h1 class="brand-title">LoafLoafGo</h1>
        </div>

        <!-- Gemini-style Search Bar -->
        <div class="search-section">
            <form id="search-form">
                <div class="search-bar-container">
                    <div class="search-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </div>
                    <input type="text" placeholder="Ask anything or enter a URL..." autocomplete="off" id="search-input">
                    <button type="submit" class="submit-btn">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Subtle background parallax effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            // Scale and move the background slightly
            document.getElementById('bg').style.transform = `scale(1.05) translate(${moveX}px, ${moveY}px)`;
        });

        // Smart Navigation Logic (URL vs Search)
        const form = document.getElementById('search-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('search-input').value.trim();
            
            if (!query) return;

            // URL Detection Logic
            const urlPattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/i;
            const isUrl = urlPattern.test(query) && !query.includes(' ');

            if (isUrl) {
                let targetUrl = query;
                if (!/^https?:\/\//i.test(query)) {
                    targetUrl = 'https://' + query;
                }
                window.location.href = targetUrl;
            } else {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        });

        // Focus input on any keypress
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName !== 'INPUT' && e.key.length === 1) {
                document.getElementById('search-input').focus();
            }
        });
    </script>
</body>
</html>
