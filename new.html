<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoafLoafGo</title>
    <!-- Importing Fira Code -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', monospace;
        }

        :root {
            --accent-color: #698f50; 

            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 50px; /* Reduced from 70px */
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* High-Reliability Background */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;

            height: 100vh;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.4s ease-out;
            background-color: #000;
        }

        #bg-layer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
        }


        /* Sidebar Styles - Smaller Width */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--glass-border);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            padding-bottom: 15px;
            gap: 12px;
            transition: var(--transition-smooth);

        }

        /* Smaller Folder Icons */
        .folder-item {
            position: relative;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition-smooth);
        }

        .folder-item:hover {

            background: var(--accent-color);
            transform: scale(1.1);
            border-color: var(--accent-color);
        }

        /* Folder Flyout Menu */
        .folder-flyout {
            position: absolute;
            left: 45px;
            top: 0;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px;
            min-width: 220px;
            display: none;
            flex-direction: column;
            gap: 8px;

            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .folder-item:hover .folder-flyout {
            display: flex;
        }

        .flyout-header {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-color);
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        .add-link-to-folder {
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.7;
        }

        .add-link-to-folder:hover { opacity: 1; color: var(--accent-color); }

        .folder-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: #eee;
            font-size: 0.85rem;
            transition: background 0.2s;
        }


        .folder-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .sidebar-add-btn {
            background: var(--accent-color);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            border: none;
            transition: var(--transition-smooth);
        }


        .sidebar-add-btn:hover {
            transform: rotate(90deg) scale(1.1);
            filter: brightness(1.2);
        }

        /* Pencil Icon for Background */
        .bg-edit-btn {
            margin-top: auto;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            opacity: 0.5;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }


        .bg-edit-btn:hover {
            opacity: 1;
            color: var(--accent-color);
            transform: scale(1.1);
        }

        /* Container - Centered Content */
        .container {
            height: 100vh;
            width: calc(100% - var(--sidebar-width));
            margin-left: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
            position: relative;
            z-index: 10;

        }

        /* Brand Title */
        .brand-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1.2s ease-out;
            cursor: default;
        }

        .brand-title {
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transition-smooth);
        }

        .brand-title:hover {

            transform: translateY(-5px);
            text-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        /* Interaction Area */
        .interaction-area {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .search-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);

            border-radius: 32px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: var(--transition-smooth);
        }

        .search-bar:focus-within {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;

            color: white;
            font-size: 1rem;
            padding: 12px 0;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.6); }

        .bookmarks-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 12px;
            align-items: center;
        }

        .bookmark-link {
            display: flex;
            align-items: center;
            gap: 8px;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
            font-weight: 300;
            transition: var(--transition-smooth);
        }

        .bookmark-link:hover {
            background: var(--accent-color);
            transform: translateY(-3px) scale(1.05);
        }

        .fav-icon { width: 14px; height: 14px; object-fit: contain; }


        .add-bookmark-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .add-bookmark-btn:hover { background: var(--accent-color); transform: scale(1.1); }

        /* Modal Styles */
        #modal, #folder-modal, #bg-modal {
            position: fixed;

            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            border-radius: 20px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            color: white;

        }

        .modal-box h3 { color: #ffffff; font-weight: 400; margin-bottom: 5px; }

        .modal-box input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            color: white;
        }

        .modal-actions { display: flex; gap: 8px; margin-top: 10px; }

        .btn { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 500; border: none; transition: var(--transition-smooth); }
        .btn-save { background: var(--accent-color); color: white; }
        .btn-cancel { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }

        /* Custom Context Menu */

        #custom-menu {
            position: fixed;
            z-index: 3000;
            width: 160px;
            background: rgba(35, 35, 35, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            padding: 5px;
        }

        .menu-item { padding: 10px 15px; color: #eee; font-size: 0.85rem; cursor: pointer; border-radius: 8px; }
        .menu-item:hover { background: var(--accent-color); color: white; }
        .menu-item.delete:hover { background: #b54d4d; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }


        @media (max-width: 600px) {
            .brand-title { font-size: 3rem; }
            #sidebar { width: 45px; }
            .container { width: calc(100% - 45px); margin-left: 45px; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <!-- Left Sidebar for Folders -->
    <div id="sidebar">
        <button class="sidebar-add-btn" id="add-folder-trigger" title="Add Folder">+</button>
        <div id="folders-container" style="display:contents;">
            <!-- Folders injected here -->
        </div>

        <!-- Pencil Icon for Background Edit -->

        <button class="bg-edit-btn" id="bg-edit-trigger" title="Change Background">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </button>
    </div>

    <div class="container">
        <div class="brand-section">
            <h1 class="brand-title">LoafLoafGo</h1>
        </div>

        <div class="interaction-area">
            <div class="search-bar">
                <span style="margin-right:15px; opacity:0.8; display:flex;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </span>
                <input type="text" placeholder="Search or type URL..." id="search-input" autocomplete="off">

            </div>

            <div class="bookmarks-row" id="bookmarks-row">
                <button class="add-bookmark-btn" id="add-bookmark-trigger" title="Add Bookmark">+</button>
            </div>
        </div>
    </div>

    <!-- Bookmark Modal -->
    <div id="modal">
        <div class="modal-box">
            <h3 id="modal-title">New Bookmark</h3>
            <input type="text" id="bm-name" placeholder="Title">
            <input type="text" id="bm-url" placeholder="URL (e.g. google.com)">
            <div class="modal-actions">
                <button class="btn btn-cancel" id="cancel-bm">Cancel</button>
                <button class="btn btn-save" id="save-bm">Save</button>
            </div>
        </div>

    </div>

    <!-- Folder Modal -->
    <div id="folder-modal">
        <div class="modal-box">
            <h3 id="folder-modal-title">New Folder</h3>
            <input type="text" id="f-emoji" placeholder="Emoji (e.g. 📁)">
            <input type="text" id="f-name" placeholder="Folder Name">
            <div class="modal-actions">
                <button class="btn btn-cancel" id="cancel-f">Cancel</button>
                <button class="btn btn-save" id="save-f">Save</button>
            </div>
        </div>
    </div>

    <!-- Background URL Modal -->
    <div id="bg-modal">
        <div class="modal-box">
            <h3>Background Image</h3>

            <input type="text" id="bg-url-input" placeholder="Image URL (empty = black)">
            <div class="modal-actions">
                <button class="btn btn-cancel" id="cancel-bg">Cancel</button>
                <button class="btn btn-save" id="save-bg">Apply</button>
            </div>
        </div>
    </div>

    <!-- Custom Context Menu -->
    <div id="custom-menu">
        <div class="menu-item" id="menu-edit">Edit</div>
        <div class="menu-item delete" id="menu-delete">Delete</div>
    </div>

    <script>
        // Data and Background Initialization
        let data = JSON.parse(localStorage.getItem('loaf_data')) || { bookmarks: [], folders: [] };
        
        function updateBackground() {

            const savedBg = localStorage.getItem('loaf_bg_url');
            const bgLayer = document.getElementById('bg-layer');
            if (savedBg && savedBg.trim() !== '') {
                bgLayer.style.backgroundImage = `url('${savedBg}')`;
                bgLayer.style.backgroundColor = 'transparent';
            } else {
                bgLayer.style.backgroundImage = 'none';
                bgLayer.style.backgroundColor = 'black';
            }
        }
        updateBackground();

        // Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            const bg = document.getElementById('bg-layer');
            if (bg) bg.style.transform = `scale(1.05) translate(${moveX}px, ${moveY}px)`;
        });


        // Search Logic
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (!query) return;
                const isUrl = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/i.test(query) && !query.includes(' ');
                if (isUrl) window.location.href = query.startsWith('http') ? query : 'https://' + query;
                else window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        });

        // --- Data Management ---
        function saveData() {
            localStorage.setItem('loaf_data', JSON.stringify(data));
            renderAll();
        }

        // --- UI Rendering ---

        const bookmarksRow = document.getElementById('bookmarks-row');
        const foldersContainer = document.getElementById('folders-container');
        const customMenu = document.getElementById('custom-menu');

        let activeContext = { type: '', index: -1, folderIndex: -1 };

        function renderAll() {
            renderGlobalBookmarks();
            renderFolders();
        }

        function renderGlobalBookmarks() {
            document.querySelectorAll('.bookmark-link').forEach(el => el.remove());
            data.bookmarks.forEach((bm, i) => {
                const link = createBookmarkElement(bm, i);
                link.oncontextmenu = (e) => triggerContextMenu(e, 'global', i);
                bookmarksRow.insertBefore(link, document.getElementById('add-bookmark-trigger'));
            });
        }


        function renderFolders() {
            foldersContainer.innerHTML = '';
            data.folders.forEach((folder, fIdx) => {
                const div = document.createElement('div');
                div.className = 'folder-item';
                div.innerText = folder.emoji || '📁';
                div.oncontextmenu = (e) => triggerContextMenu(e, 'folder', fIdx);

                const flyout = document.createElement('div');
                flyout.className = 'folder-flyout';
                const header = document.createElement('div');
                header.className = 'flyout-header';
                header.innerHTML = `<span>${folder.name}</span><span class="add-link-to-folder" onclick="openBmModal(${fIdx})">+</span>`;
                flyout.appendChild(header);

                folder.links.forEach((linkData, lIdx) => {
                    const l = document.createElement('a');
                    l.className = 'folder-link';
                    l.href = linkData.url.startsWith('http') ? linkData.url : 'https://' + linkData.url;

                    const domain = linkData.url.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0];
                    l.innerHTML = `<img class="fav-icon" src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22white%22><path d=%22M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z%22/></svg>'"> ${linkData.name}`;
                    l.oncontextmenu = (e) => triggerContextMenu(e, 'folder-link', lIdx, fIdx);
                    flyout.appendChild(l);
                });

                div.appendChild(flyout);
                foldersContainer.appendChild(div);
            });
        }

        function createBookmarkElement(bm, i) {
            const domain = bm.url.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0];
            const a = document.createElement('a');
            a.className = 'bookmark-link';
            a.href = bm.url.startsWith('http') ? bm.url : 'https://' + bm.url;
            a.innerHTML = `<img class="fav-icon" src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" onerror="this.innerText='🌐'"> ${bm.name}`;
            return a;
        }


        // --- Modals ---
        const bmModal = document.getElementById('modal');
        const folderModal = document.getElementById('folder-modal');
        const bgModal = document.getElementById('bg-modal');
        let currentTargetFolder = -1;

        window.openBmModal = (fIdx = -1) => {
            currentTargetFolder = fIdx;
            document.getElementById('modal-title').innerText = fIdx === -1 ? "New Bookmark" : "Add to " + data.folders[fIdx].name;
            document.getElementById('bm-name').value = '';
            document.getElementById('bm-url').value = '';
            bmModal.style.display = 'flex';
        };

        document.getElementById('add-bookmark-trigger').onclick = () => openBmModal();
        document.getElementById('cancel-bm').onclick = () => bmModal.style.display = 'none';

        document.getElementById('save-bm').onclick = () => {
            const name = document.getElementById('bm-name').value.trim();

            const url = document.getElementById('bm-url').value.trim();
            if (!name || !url) return;
            if (currentTargetFolder === -1) {
                if (activeContext.type === 'global' && activeContext.index !== -1) data.bookmarks[activeContext.index] = { name, url };
                else data.bookmarks.push({ name, url });
            } else {
                if (activeContext.type === 'folder-link') data.folders[currentTargetFolder].links[activeContext.index] = { name, url };
                else data.folders[currentTargetFolder].links.push({ name, url });
            }
            bmModal.style.display = 'none';
            saveData();
        };

        document.getElementById('add-folder-trigger').onclick = () => {
            activeContext.type = '';
            document.getElementById('f-emoji').value = '📁';
            document.getElementById('f-name').value = '';
            folderModal.style.display = 'flex';
        };


        document.getElementById('cancel-f').onclick = () => folderModal.style.display = 'none';
        document.getElementById('save-f').onclick = () => {
            const emoji = document.getElementById('f-emoji').value.trim();
            const name = document.getElementById('f-name').value.trim();
            if (!name) return;
            if (activeContext.type === 'folder') {
                data.folders[activeContext.index].emoji = emoji;
                data.folders[activeContext.index].name = name;
            } else data.folders.push({ emoji, name, links: [] });
            folderModal.style.display = 'none';
            saveData();
        };

        // --- Background Modal ---
        document.getElementById('bg-edit-trigger').onclick = () => {
            document.getElementById('bg-url-input').value = localStorage.getItem('loaf_bg_url') || '';
            bgModal.style.display = 'flex';
        };
        document.getElementById('cancel-bg').onclick = () => bgModal.style.display = 'none';

        document.getElementById('save-bg').onclick = () => {
            const url = document.getElementById('bg-url-input').value.trim();
            localStorage.setItem('loaf_bg_url', url);
            updateBackground();
            bgModal.style.display = 'none';
        };

        // --- Context Menu ---
        function triggerContextMenu(e, type, index, folderIndex = -1) {
            e.preventDefault();
            e.stopPropagation();
            activeContext = { type, index, folderIndex };
            customMenu.style.display = 'flex';
            customMenu.style.left = `${e.clientX}px`;
            customMenu.style.top = `${e.clientY}px`;
        }

        document.addEventListener('click', () => customMenu.style.display = 'none');
        document.getElementById('menu-delete').onclick = () => {

            const { type, index, folderIndex } = activeContext;
            if (confirm(`Delete this ${type.replace('-', ' ')}?`)) {
                if (type === 'global') data.bookmarks.splice(index, 1);
                else if (type === 'folder') data.folders.splice(index, 1);
                else if (type === 'folder-link') data.folders[folderIndex].links.splice(index, 1);
                saveData();
            }
        };

        document.getElementById('menu-edit').onclick = () => {
            const { type, index, folderIndex } = activeContext;
            if (type === 'global') {
                const bm = data.bookmarks[index];
                document.getElementById('bm-name').value = bm.name;
                document.getElementById('bm-url').value = bm.url;
                currentTargetFolder = -1;
                bmModal.style.display = 'flex';
            } else if (type === 'folder') {
                const f = data.folders[index];

                document.getElementById('f-emoji').value = f.emoji;
                document.getElementById('f-name').value = f.name;
                folderModal.style.display = 'flex';
            } else if (type === 'folder-link') {
                const bm = data.folders[folderIndex].links[index];
                document.getElementById('bm-name').value = bm.name;
                document.getElementById('bm-url').value = bm.url;
                currentTargetFolder = folderIndex;
                bmModal.style.display = 'flex';
            }
        };

        renderAll();

        // Focus search on keypress
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName !== 'INPUT' && e.key.length === 1 && 
                bmModal.style.display !== 'flex' && folderModal.style.display !== 'flex' &&
                bgModal.style.display !== 'flex' && !e.ctrlKey && !e.metaKey) {

                searchInput.focus();
            }
        });
    </script>
</body>
</html>
