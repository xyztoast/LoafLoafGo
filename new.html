# LoafLoafGo with Reliable Bookmarks

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoafLoafGo</title>
    <!-- Importing Fira Code -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', monospace;
        }

        body, html {
            height: 100%;

            width: 100%;
            overflow: hidden;
            background-color: #0a0a0a;
        }

        /* High-Reliability Background */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: url('https://images.unsplash.com/photo-1723974204878-16e9c33f02c1?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.4s ease-out;
        }


        #bg-layer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
        }

        .container {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;

            position: relative;
            z-index: 10;
        }

        /* Brand Title */
        .brand-section {
            text-align: center;
            margin-bottom: auto;
            margin-top: 15vh;
            animation: fadeIn 1.2s ease-out;
        }

        .brand-title {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }


        /* Interaction Area (Hugging layout) */
        .interaction-area {
            width: 100%;
            max-width: 800px;
            margin-bottom: 15vh;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Very close spacing */
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Search Bar */
        .search-bar {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 8px 24px;

            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .search-bar:focus-within {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .search-icon {
            margin-right: 15px;
            opacity: 0.8;
            display: flex;
        }

        input {
            flex: 1;
            background: transparent;

            border: none;
            outline: none;
            color: white;
            font-size: 1rem;
            padding: 12px 0;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Bookmarks Row */
        .bookmarks-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 12px;
            align-items: center;
        }


        .bookmark-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
            font-weight: 300;
            transition: all 0.2s ease;
        }

        .bookmark-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);

        }

        .fav-icon {
            width: 14px;
            height: 14px;
            object-fit: contain;
            display: block;
        }

        /* Icon Fallback - shows if img fails */
        .fav-icon[src=""] { visibility: hidden; }

        .add-bookmark-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .add-bookmark-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* Modal Overlay */
        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);

            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            border-radius: 20px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-box input {
            background: rgba(255,255,255,0.05);

            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            color: white;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            border: none;

        }

        .btn-save { background: white; color: black; }
        .btn-cancel { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .brand-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="container">
        <div class="brand-section">

            <h1 class="brand-title">LoafLoafGo</h1>
        </div>

        <div class="interaction-area">
            <div class="search-bar">
                <span class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </span>
                <input type="text" placeholder="Search or type URL..." id="search-input" autocomplete="off">
            </div>

            <div class="bookmarks-row" id="bookmarks-row">
                <button class="add-bookmark-btn" id="add-btn">+</button>
            </div>
        </div>
    </div>


    <!-- Modal -->
    <div id="modal">
        <div class="modal-box">
            <h3 style="font-weight: 400; margin-bottom: 5px;">New Bookmark</h3>
            <input type="text" id="name-input" placeholder="Title">
            <input type="text" id="url-input" placeholder="URL (e.g. google.com)">
            <div class="modal-actions">
                <button class="btn btn-cancel" id="cancel-btn">Cancel</button>
                <button class="btn btn-save" id="save-btn">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            document.getElementById('bg-layer').style.transform = `scale(1.05) translate(${moveX}px, ${moveY}px)`;

        });

        // Search Logic
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (!query) return;
                const isUrl = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/i.test(query) && !query.includes(' ');
                if (isUrl) {
                    window.location.href = query.startsWith('http') ? query : 'https://' + query;
                } else {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                }
            }
        });

        // Bookmark Logic
        const bookmarksRow = document.getElementById('bookmarks-row');

        const modal = document.getElementById('modal');
        const addBtn = document.getElementById('add-btn');

        function renderBookmarks() {
            // Remove existing links
            document.querySelectorAll('.bookmark-link').forEach(el => el.remove());
            const stored = JSON.parse(localStorage.getItem('loaf_bookmarks') || '[]');
            
            stored.forEach((bm, i) => {
                const domain = bm.url.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0];
                const link = document.createElement('a');
                link.className = 'bookmark-link';
                link.href = bm.url.startsWith('http') ? bm.url : 'https://' + bm.url;
                
                // Favicon with fallback
                const icon = document.createElement('img');
                icon.className = 'fav-icon';
                icon.src = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
                icon.onerror = () => {

                    // Fallback to a simple SVG icon if image fails
                    icon.style.display = 'none';
                    const fallback = document.createElement('span');
                    fallback.innerHTML = '🌐';
                    fallback.style.fontSize = '12px';
                    link.prepend(fallback);
                };

                link.appendChild(icon);
                link.appendChild(document.createTextNode(bm.name));
                
                // Right click to delete
                link.oncontextmenu = (e) => {
                    e.preventDefault();
                    if(confirm(`Delete "${bm.name}"?`)) {
                        stored.splice(i, 1);
                        localStorage.setItem('loaf_bookmarks', JSON.stringify(stored));
                        renderBookmarks();
                    }

                };

                bookmarksRow.insertBefore(link, addBtn);
            });
        }

        addBtn.onclick = () => modal.style.display = 'flex';
        document.getElementById('cancel-btn').onclick = () => modal.style.display = 'none';
        
        document.getElementById('save-btn').onclick = () => {
            const name = document.getElementById('name-input').value.trim();
            const url = document.getElementById('url-input').value.trim();
            if (name && url) {
                const stored = JSON.parse(localStorage.getItem('loaf_bookmarks') || '[]');
                stored.push({ name, url });
                localStorage.setItem('loaf_bookmarks', JSON.stringify(stored));
                modal.style.display = 'none';
                document.getElementById('name-input').value = '';
                document.getElementById('url-input').value = '';

                renderBookmarks();
            }
        };

        renderBookmarks();

        // Focus search on keypress
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName !== 'INPUT' && e.key.length === 1 && modal.style.display !== 'flex') {
                searchInput.focus();
            }
        });
    </script>
</body>
</html>
